<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎴 가나 카루타 — 히라가나·카타카나 연습 게임</title>
<style>
  :root{
    --bg:#1a1d29; --card:#252a3d; --card-hover:#2f3650; --accent:#7c9aff;
    --good:#4ade80; --bad:#f87171; --text:#e8eaf2; --sub:#9aa3c0; --gold:#fbbf24;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px;}
  h1{font-size:1.5rem; margin:8px 0 2px;}
  .sub{color:var(--sub); font-size:.85rem; margin-bottom:16px; text-align:center;}
  .panel{background:var(--card); border-radius:16px; padding:20px; max-width:560px; width:100%; margin-bottom:14px;}
  .panel h2{font-size:1rem; margin-bottom:10px; color:var(--accent);}
  .opts{display:flex; flex-wrap:wrap; gap:8px;}
  .opt{background:#323950; border:2px solid transparent; border-radius:10px; padding:8px 14px; cursor:pointer; font-size:.9rem; user-select:none; transition:.15s;}
  .opt.sel{border-color:var(--accent); background:#3b4668; font-weight:700;}
  .startbtn{margin-top:6px; width:100%; max-width:560px; padding:16px; font-size:1.2rem; font-weight:800; color:#11131c; background:linear-gradient(135deg,#7c9aff,#9f7cff); border:none; border-radius:14px; cursor:pointer;}
  .startbtn:active{transform:scale(.98);}
  /* game */
  #game{display:none; width:100%; max-width:560px;}
  .hud{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:.9rem; color:var(--sub);}
  .hud b{color:var(--text);}
  .prompt{background:var(--card); border-radius:16px; padding:18px; text-align:center; margin-bottom:14px;}
  .prompt .big{font-size:2.6rem; font-weight:800; letter-spacing:2px;}
  .prompt .small{color:var(--sub); font-size:.9rem; margin-top:2px;}
  .speak{margin-top:8px; background:#323950; color:var(--text); border:none; border-radius:10px; padding:8px 18px; font-size:1rem; cursor:pointer;}
  .board{display:grid; gap:10px;}
  .kcard{aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:700; background:var(--card); border-radius:14px; cursor:pointer; transition:.12s; border:2px solid #323950;}
  .kcard:hover{background:var(--card-hover);}
  .kcard.right{background:#14532d; border-color:var(--good); pointer-events:none;}
  .kcard.wrong{animation:shake .3s; border-color:var(--bad);}
  .kcard.gone{opacity:0; pointer-events:none; transform:scale(.7);}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  /* result */
  #result{display:none; text-align:center;}
  #result .panel{padding:28px;}
  .resnum{font-size:2rem; font-weight:800; color:var(--gold);}
  .btnrow{display:flex; gap:10px; justify-content:center; margin-top:16px;}
  .btnrow button{padding:12px 20px; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer;}
  .again{background:var(--accent); color:#11131c;}
  .back{background:#323950; color:var(--text);}
  .note{color:var(--sub); font-size:.78rem; margin-top:10px; line-height:1.5;}
</style>
</head>
<body>
<h1>🎴 가나 카루타</h1>
<div class="sub">소리를 듣고(또는 발음을 보고) 맞는 글자 카드를 최대한 빨리 치세요!</div>

<div id="setup">
  <div class="panel"><h2>① 글자 종류</h2>
    <div class="opts" id="scriptOpts">
      <div class="opt sel" data-v="hira">히라가나</div>
      <div class="opt" data-v="kata">카타카나</div>
      <div class="opt" data-v="both">혼합</div>
    </div>
  </div>
  <div class="panel"><h2>② 범위 (가이드 일차, 여러 개 선택)</h2>
    <div class="opts" id="dayOpts">
      <div class="opt sel" data-v="1">1일차</div>
      <div class="opt" data-v="2">2일차</div>
      <div class="opt" data-v="3">3일차</div>
      <div class="opt" data-v="4">4일차</div>
      <div class="opt" data-v="5">5일차</div>
      <div class="opt" data-v="6">6일차(탁음)</div>
      <div class="opt" data-v="7">7일차(요음)</div>
    </div>
  </div>
  <div class="panel"><h2>③ 난이도</h2>
    <div class="opts" id="modeOpts">
      <div class="opt sel" data-v="easy">🔊소리+한글 발음</div>
      <div class="opt" data-v="mid">🔊소리+로마자</div>
      <div class="opt" data-v="hard">🔊소리만 (고수)</div>
    </div>
    <div style="height:10px"></div>
    <div class="opts" id="sizeOpts">
      <div class="opt" data-v="6">카드 6장</div>
      <div class="opt sel" data-v="9">카드 9장</div>
      <div class="opt" data-v="12">카드 12장</div>
    </div>
  </div>
  <button class="startbtn" onclick="startGame()">게임 시작 ▶</button>
  <div class="note">💡 소리가 안 나면 기기에 일본어 TTS 음성이 없는 것 — 발음 표시 모드로 연습하세요. 폰에서도 이 파일을 열면 똑같이 작동합니다.</div>
</div>

<div id="game">
  <div class="hud">
    <span>문제 <b id="round">1</b>/<b id="total">10</b></span>
    <span>⏱ <b id="timer">0.0</b>초</span>
    <span>실수 <b id="miss">0</b></span>
  </div>
  <div class="prompt">
    <div class="big" id="promptText">아</div>
    <div class="small" id="promptSub"></div>
    <button class="speak" onclick="speakTarget()">🔊 다시 듣기</button>
  </div>
  <div class="board" id="board"></div>
</div>

<div id="result">
  <div class="panel">
    <h2>🎉 결과</h2>
    <div class="resnum" id="resTime"></div>
    <div id="resAcc" style="margin-top:6px"></div>
    <div id="resBest" style="margin-top:6px; color:var(--sub)"></div>
    <div class="btnrow">
      <button class="again" onclick="startGame()">한 판 더</button>
      <button class="back" onclick="goSetup()">설정으로</button>
    </div>
  </div>
</div>

<script>
// ---------- 데이터 (가이드 일차와 동일한 구성) ----------
const HIRA = [
 // day1
 ["あ","a","아",1],["い","i","이",1],["う","u","우",1],["え","e","에",1],["お","o","오",1],
 // day2
 ["か","ka","카",2],["き","ki","키",2],["く","ku","쿠",2],["け","ke","케",2],["こ","ko","코",2],
 ["さ","sa","사",2],["し","shi","시",2],["す","su","스",2],["せ","se","세",2],["そ","so","소",2],
 // day3
 ["た","ta","타",3],["ち","chi","치",3],["つ","tsu","츠",3],["て","te","테",3],["と","to","토",3],
 ["な","na","나",3],["に","ni","니",3],["ぬ","nu","누",3],["ね","ne","네",3],["の","no","노",3],
 // day4
 ["は","ha","하",4],["ひ","hi","히",4],["ふ","fu","후",4],["へ","he","헤",4],["ほ","ho","호",4],
 ["ま","ma","마",4],["み","mi","미",4],["む","mu","무",4],["め","me","메",4],["も","mo","모",4],
 // day5
 ["や","ya","야",5],["ゆ","yu","유",5],["よ","yo","요",5],
 ["ら","ra","라",5],["り","ri","리",5],["る","ru","루",5],["れ","re","레",5],["ろ","ro","로",5],
 // day6
 ["わ","wa","와",6],["を","wo","오",6],["ん","n","응",6],
 ["が","ga","가",6],["ぎ","gi","기",6],["ぐ","gu","구",6],["げ","ge","게",6],["ご","go","고",6],
 ["ざ","za","자",6],["じ","ji","지",6],["ず","zu","즈",6],["ぜ","ze","제",6],["ぞ","zo","조",6],
 ["だ","da","다",6],["で","de","데",6],["ど","do","도",6],
 ["ば","ba","바",6],["び","bi","비",6],["ぶ","bu","부",6],["べ","be","베",6],["ぼ","bo","보",6],
 ["ぱ","pa","파",6],["ぴ","pi","피",6],["ぷ","pu","푸",6],["ぺ","pe","페",6],["ぽ","po","포",6],
 // day7 (요음)
 ["きゃ","kya","캬",7],["きゅ","kyu","큐",7],["きょ","kyo","쿄",7],
 ["しゃ","sha","샤",7],["しゅ","shu","슈",7],["しょ","sho","쇼",7],
 ["ちゃ","cha","챠",7],["ちゅ","chu","츄",7],["ちょ","cho","쵸",7],
 ["じゃ","ja","쟈",7],["じゅ","ju","쥬",7],["じょ","jo","죠",7],
 ["りゃ","rya","랴",7],["りゅ","ryu","류",7],["りょ","ryo","료",7]
];
const KATA = [
 ["ア","a","아",1],["イ","i","이",1],["ウ","u","우",1],["エ","e","에",1],["オ","o","오",1],
 ["カ","ka","카",2],["キ","ki","키",2],["ク","ku","쿠",2],["ケ","ke","케",2],["コ","ko","코",2],
 ["サ","sa","사",2],["シ","shi","시",2],["ス","su","스",2],["セ","se","세",2],["ソ","so","소",2],
 ["タ","ta","타",3],["チ","chi","치",3],["ツ","tsu","츠",3],["テ","te","테",3],["ト","to","토",3],
 ["ナ","na","나",3],["ニ","ni","니",3],["ヌ","nu","누",3],["ネ","ne","네",3],["ノ","no","노",3],
 ["ハ","ha","하",4],["ヒ","hi","히",4],["フ","fu","후",4],["ヘ","he","헤",4],["ホ","ho","호",4],
 ["マ","ma","마",4],["ミ","mi","미",4],["ム","mu","무",4],["メ","me","메",4],["モ","mo","모",4],
 ["ヤ","ya","야",5],["ユ","yu","유",5],["ヨ","yo","요",5],
 ["ラ","ra","라",5],["リ","ri","리",5],["ル","ru","루",5],["レ","re","레",5],["ロ","ro","로",5],
 ["ワ","wa","와",6],["ヲ","wo","오",6],["ン","n","응",6],
 ["ガ","ga","가",6],["ギ","gi","기",6],["グ","gu","구",6],["ゲ","ge","게",6],["ゴ","go","고",6],
 ["ザ","za","자",6],["ジ","ji","지",6],["ズ","zu","즈",6],["ゼ","ze","제",6],["ゾ","zo","조",6],
 ["ダ","da","다",6],["デ","de","데",6],["ド","do","도",6],
 ["バ","ba","바",6],["ビ","bi","비",6],["ブ","bu","부",6],["ベ","be","베",6],["ボ","bo","보",6],
 ["パ","pa","파",6],["ピ","pi","피",6],["プ","pu","푸",6],["ペ","pe","페",6],["ポ","po","포",6],
 ["キャ","kya","캬",7],["キュ","kyu","큐",7],["キョ","kyo","쿄",7],
 ["シャ","sha","샤",7],["シュ","shu","슈",7],["ショ","sho","쇼",7],
 ["チャ","cha","챠",7],["チュ","chu","츄",7],["チョ","cho","쵸",7],
 ["ジャ","ja","쟈",7],["ジュ","ju","쥬",7],["ジョ","jo","죠",7],
 ["リャ","rya","랴",7],["リュ","ryu","류",7],["リョ","ryo","료",7]
];

// ---------- 설정 UI ----------
function bindOpts(id, multi){
  const wrap = document.getElementById(id);
  wrap.querySelectorAll('.opt').forEach(o=>{
    o.onclick = ()=>{
      if(multi){ o.classList.toggle('sel');
        if(!wrap.querySelector('.sel')) o.classList.add('sel'); // 최소 1개
      } else {
        wrap.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
        o.classList.add('sel');
      }
    };
  });
}
bindOpts('scriptOpts',false); bindOpts('dayOpts',true);
bindOpts('modeOpts',false); bindOpts('sizeOpts',false);
const getSel = id => [...document.querySelectorAll('#'+id+' .sel')].map(o=>o.dataset.v);

// ---------- TTS ----------
let jaVoice = null;
function loadVoice(){
  const vs = speechSynthesis.getVoices();
  jaVoice = vs.find(v=>v.lang && v.lang.toLowerCase().startsWith('ja')) || null;
}
if('speechSynthesis' in window){ loadVoice(); speechSynthesis.onvoiceschanged = loadVoice; }
function speak(text){
  if(!('speechSynthesis' in window)) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; if(jaVoice) u.voice=jaVoice; u.rate=0.8;
    speechSynthesis.speak(u);
  }catch(e){}
}

// ---------- 게임 ----------
let pool=[], targets=[], cur=0, totalRounds=10, misses=0, target=null;
let t0=0, timerId=null, boardCards=[], mode='easy', settingsKey='';

const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; };

function startGame(){
  const script = getSel('scriptOpts')[0];
  const days = getSel('dayOpts').map(Number);
  mode = getSel('modeOpts')[0];
  const size = Number(getSel('sizeOpts')[0]);

  let src = script==='hira'?HIRA: script==='kata'?KATA: HIRA.concat(KATA);
  pool = src.filter(x=>days.includes(x[3]));
  if(pool.length < 4){ alert('선택한 범위의 글자가 너무 적어요. 일차를 더 선택해 주세요!'); return; }

  const boardSize = Math.min(size, pool.length);
  totalRounds = Math.min(10, pool.length);
  targets = shuffle([...pool]).slice(0, totalRounds);
  cur=0; misses=0;
  settingsKey = 'karuta_'+script+'_'+days.join('')+'_'+mode+'_'+boardSize;

  document.getElementById('setup').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('total').textContent = totalRounds;
  document.getElementById('miss').textContent = 0;

  // 보드 구성: 타깃들 + 채우기
  const others = shuffle(pool.filter(x=>!targets.includes(x)));
  boardCards = shuffle(targets.concat(others).slice(0, boardSize));
  // 타깃이 보드에 모두 없으면 안되므로: 보드에 없는 타깃은 라운드마다 카드 교체로 처리
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = 'repeat('+(boardSize<=6?3: boardSize<=9?3:4)+',1fr)';
  board.innerHTML='';
  boardCards.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='kcard'; d.textContent=c[0]; d.dataset.i=i;
    d.onclick=()=>tap(d,c);
    board.appendChild(d);
  });

  t0=performance.now();
  clearInterval(timerId);
  timerId=setInterval(()=>{ document.getElementById('timer').textContent=((performance.now()-t0)/1000).toFixed(1); },100);
  nextRound();
}

function nextRound(){
  if(cur>=totalRounds){ return endGame(); }
  target = targets[cur];
  // 타깃이 보드에 없으면, 이미 맞힌(gone) 카드 하나를 타깃으로 교체
  if(!boardCards.includes(target)){
    const goneEl=[...document.querySelectorAll('.kcard.right')][0] || [...document.querySelectorAll('.kcard')][0];
    const idx=Number(goneEl.dataset.i);
    boardCards[idx]=target;
    goneEl.textContent=target[0];
    goneEl.className='kcard';
    goneEl.onclick=()=>tap(goneEl,target);
  }
  document.getElementById('round').textContent=cur+1;
  const pt=document.getElementById('promptText'), ps=document.getElementById('promptSub');
  if(mode==='easy'){ pt.textContent=target[2]; ps.textContent=target[1]; }
  else if(mode==='mid'){ pt.textContent=target[1]; ps.textContent='로마자를 보고 찾으세요'; }
  else { pt.textContent='🔊'; ps.textContent='소리만 듣고 찾으세요'; }
  speak(target[0]);
}
function speakTarget(){ if(target) speak(target[0]); }

function tap(el, c){
  if(c===target){
    el.classList.add('right');
    cur++;
    setTimeout(nextRound, 350);
  } else {
    misses++;
    document.getElementById('miss').textContent=misses;
    el.classList.remove('wrong'); void el.offsetWidth; el.classList.add('wrong');
  }
}

function endGame(){
  clearInterval(timerId);
  const sec=(performance.now()-t0)/1000;
  const acc=Math.round(totalRounds/(totalRounds+misses)*100);
  document.getElementById('game').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('resTime').textContent=sec.toFixed(1)+'초';
  document.getElementById('resAcc').textContent='정확도 '+acc+'% (실수 '+misses+'회)';
  let bestMsg='';
  try{
    const prev=Number(localStorage.getItem(settingsKey));
    if(!prev || sec<prev){ localStorage.setItem(settingsKey, sec); bestMsg='🏆 신기록!'; }
    else bestMsg='최고 기록: '+prev.toFixed(1)+'초';
  }catch(e){}
  document.getElementById('resBest').textContent=bestMsg;
}

function goSetup(){
  clearInterval(timerId);
  document.getElementById('game').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('setup').style.display='block';
}
</script>
</body>
</html>
